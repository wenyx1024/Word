<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>语音输入</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 800px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 22px;
        }
        
        .text-box-container {
            flex: 1;
            min-height: 0;
            margin-bottom: 15px;
        }
        
        .text-box {
            width: 100%;
            height: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            -webkit-appearance: none;
        }
        
        .text-box:focus {
            border-color: #667eea;
        }
        
        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .clear-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            color: #666;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            -webkit-appearance: none;
        }
        
        .clear-btn:active {
            border-color: #667eea;
            color: #667eea;
            transform: scale(0.98);
        }
        
        .voice-btn-container {
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }
        
        .voice-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
            -webkit-appearance: none;
        }
        
        .voice-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
        }
        
        .voice-btn.recording {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse 1.2s infinite;
        }
        
        .voice-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        .voice-btn svg {
            width: 28px;
            height: 28px;
            margin-bottom: 3px;
            fill: currentColor;
        }
        
        .status {
            text-align: center;
            font-size: 13px;
            color: #666;
            min-height: 36px;
            line-height: 1.4;
            padding: 0 10px;
        }
        
        .status.recording {
            color: #f5576c;
        }
        
        .status.error {
            color: #e74c3c;
        }
        
        .status.success {
            color: #27ae60;
        }
        
        .tip-box {
            background: #f8f9fa;
            border-left: 3px solid #667eea;
            padding: 10px 12px;
            margin-bottom: 12px;
            border-radius: 0 8px 8px 0;
            font-size: 12px;
            color: #555;
            line-height: 1.5;
        }
        
        .tip-box strong {
            color: #333;
        }
        
        .unsupported {
            display: none;
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 13px;
            text-align: center;
        }
        
        .browser-tip {
            background: #ffebee;
            border-left: 3px solid #f44336;
            padding: 10px 12px;
            margin-bottom: 12px;
            border-radius: 0 8px 8px 0;
            font-size: 12px;
            color: #c62828;
            line-height: 1.5;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 语音输入</h1>
        
        <div class="browser-tip" id="browserTip">
            <strong>⚠️ 浏览器不支持</strong><br>
            QQ浏览器不支持语音识别功能，请使用 Chrome 浏览器或手机自带浏览器
        </div>
        
        <div class="tip-box" id="tipBox">
            <strong>使用提示：</strong><br>
            1. 点击麦克风图标开始<br>
            2. 说完后再次点击结束<br>
            3. 推荐：Chrome/Edge/手机自带浏览器
        </div>
        
        <div class="unsupported" id="unsupportedMsg">
            您的浏览器不支持语音识别<br>
            请使用 Chrome、Edge 或手机自带浏览器
        </div>
        
        <div class="text-box-container">
            <textarea 
                class="text-box" 
                id="textBox" 
                placeholder="语音内容将显示在这里..."
            ></textarea>
        </div>
        
        <div class="btn-row">
            <button class="clear-btn" id="clearBtn">清空</button>
            <button class="clear-btn" id="copyBtn">复制</button>
        </div>
        
        <div class="voice-btn-container">
            <button class="voice-btn" id="voiceBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
                <span id="btnText">点击说话</span>
            </button>
        </div>
        
        <div class="status" id="status">初始化中...</div>
    </div>

    <script>
        // 检测浏览器类型
        const ua = navigator.userAgent.toLowerCase();
        const isQQBrowser = ua.indexOf('qqbrowser') > -1;
        const isWeChat = ua.indexOf('micromessenger') > -1;
        const isChrome = ua.indexOf('chrome') > -1 && !isQQBrowser;
        
        console.log('浏览器:', ua);
        
        // 如果是QQ浏览器，显示提示
        if (isQQBrowser || isWeChat) {
            document.getElementById('browserTip').style.display = 'block';
            document.getElementById('tipBox').style.display = 'none';
            document.getElementById('voiceBtn').style.display = 'none';
            document.getElementById('status').textContent = 'QQ浏览器不支持语音识别';
            document.getElementById('status').className = 'status error';
        }
        
        // 正常浏览器继续初始化
        if (!isQQBrowser && !isWeChat) {
            const textBox = document.getElementById('textBox');
            const voiceBtn = document.getElementById('voiceBtn');
            const status = document.getElementById('status');
            const btnText = document.getElementById('btnText');
            const clearBtn = document.getElementById('clearBtn');
            const copyBtn = document.getElementById('copyBtn');
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                document.getElementById('unsupportedMsg').style.display = 'block';
                document.getElementById('tipBox').style.display = 'none';
                voiceBtn.style.display = 'none';
                status.textContent = '浏览器不支持语音识别';
                status.className = 'status error';
            } else {
                let recognition = null;
                let isRecording = false;
                let finalTranscript = '';
                
                function initRecognition() {
                    try {
                        recognition = new SpeechRecognition();
                        recognition.continuous = true;
                        recognition.interimResults = true;
                        recognition.lang = 'zh-CN';
                        
                        recognition.onstart = function() {
                            isRecording = true;
                            voiceBtn.classList.add('recording');
                            btnText.textContent = '点击结束';
                            status.textContent = '正在聆听...';
                            status.className = 'status recording';
                        };
                        
                        recognition.onresult = function(event) {
                            let interimTranscript = '';
                            
                            for (let i = event.resultIndex; i < event.results.length; i++) {
                                const transcript = event.results[i][0].transcript;
                                if (event.results[i].isFinal) {
                                    finalTranscript += transcript;
                                } else {
                                    interimTranscript += transcript;
                                }
                            }
                            
                            textBox.value = finalTranscript + interimTranscript;
                            textBox.scrollTop = textBox.scrollHeight;
                        };
                        
                        recognition.onerror = function(event) {
                            if (event.error === 'no-speech') return;
                            status.textContent = '错误: ' + event.error;
                            status.className = 'status error';
                            stopRecording();
                        };
                        
                        recognition.onend = function() {
                            if (isRecording) {
                                setTimeout(() => {
                                    try {
                                        recognition.start();
                                    } catch (e) {
                                        stopRecording();
                                    }
                                }, 100);
                            }
                        };
                        
                        return true;
                    } catch (e) {
                        return false;
                    }
                }
                
                async function toggleRecording() {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        stream.getTracks().forEach(track => track.stop());
                    } catch (err) {
                        status.textContent = '麦克风权限被拒绝';
                        status.className = 'status error';
                        return;
                    }
                    
                    if (isRecording) {
                        stopRecording();
                    } else {
                        startRecording();
                    }
                }
                
                function startRecording() {
                    if (!recognition) {
                        if (!initRecognition()) return;
                    }
                    
                    finalTranscript = textBox.value;
                    if (finalTranscript && !finalTranscript.endsWith(' ')) {
                        finalTranscript += ' ';
                    }
                    
                    try {
                        recognition.start();
                    } catch (e) {
                        status.textContent = '启动失败';
                        status.className = 'status error';
                    }
                }
                
                function stopRecording() {
                    isRecording = false;
                    if (recognition) {
                        try {
                            recognition.stop();
                        } catch (e) {}
                    }
                    voiceBtn.classList.remove('recording');
                    btnText.textContent = '点击说话';
                    status.textContent = '点击麦克风开始';
                    status.className = 'status';
                }
                
                voiceBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    toggleRecording();
                });
                
                clearBtn.addEventListener('click', function() {
                    textBox.value = '';
                    finalTranscript = '';
                    status.textContent = '已清空';
                    status.className = 'status success';
                    setTimeout(() => {
                        status.textContent = '点击麦克风开始';
                        status.className = 'status';
                    }, 1500);
                });
                
                copyBtn.addEventListener('click', function() {
                    if (!textBox.value) {
                        status.textContent = '没有内容';
                        status.className = 'status error';
                        return;
                    }
                    
                    textBox.select();
                    document.execCommand('copy');
                    status.textContent = '已复制';
                    status.className = 'status success';
                    setTimeout(() => {
                        status.textContent = '点击麦克风开始';
                        status.className = 'status';
                    }, 1500);
                });
                
                status.textContent = '点击麦克风开始';
                status.className = 'status';
            }
        }
    </script>
</body>
</html>
