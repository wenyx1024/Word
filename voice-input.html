<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>语音输入</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .text-box {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .text-box:focus {
            border-color: #667eea;
        }
        
        .text-box::placeholder {
            color: #999;
        }
        
        .voice-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }
        
        .voice-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        .voice-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
        }
        
        .voice-btn.recording {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
        
        .voice-btn svg {
            width: 32px;
            height: 32px;
            margin-bottom: 5px;
            fill: currentColor;
        }
        
        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            min-height: 20px;
        }
        
        .status.recording {
            color: #f5576c;
        }
        
        .clear-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            color: #666;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .clear-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .unsupported {
            display: none;
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 语音输入</h1>
        
        <div class="unsupported" id="unsupportedMsg">
            您的浏览器不支持语音识别功能，请使用 Chrome、Safari 或 Edge 浏览器。
        </div>
        
        <textarea 
            class="text-box" 
            id="textBox" 
            placeholder="按住下方按钮开始语音输入..."
        ></textarea>
        
        <button class="clear-btn" id="clearBtn">清空内容</button>
        
        <div class="voice-btn-container">
            <button class="voice-btn" id="voiceBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
                <span>按住说话</span>
            </button>
        </div>
        
        <div class="status" id="status">按住按钮开始说话</div>
    </div>

    <script>
        // 获取DOM元素
        const textBox = document.getElementById('textBox');
        const voiceBtn = document.getElementById('voiceBtn');
        const status = document.getElementById('status');
        const clearBtn = document.getElementById('clearBtn');
        const unsupportedMsg = document.getElementById('unsupportedMsg');
        
        // 检查浏览器支持
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            unsupportedMsg.style.display = 'block';
            voiceBtn.style.display = 'none';
        }
        
        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';
        
        // 初始化语音识别
        function initRecognition() {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';
            
            recognition.onstart = function() {
                isRecording = true;
                voiceBtn.classList.add('recording');
                voiceBtn.querySelector('span').textContent = '录音中...';
                status.textContent = '正在聆听，请说话...';
                status.classList.add('recording');
            };
            
            recognition.onresult = function(event) {
                let interimTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }
                
                textBox.value = finalTranscript + interimTranscript;
            };
            
            recognition.onerror = function(event) {
                console.error('语音识别错误:', event.error);
                status.textContent = '识别出错: ' + event.error;
                stopRecording();
            };
            
            recognition.onend = function() {
                if (isRecording) {
                    // 如果仍在录音状态但意外结束，尝试重新开始
                    try {
                        recognition.start();
                    } catch (e) {
                        stopRecording();
                    }
                }
            };
        }
        
        // 开始录音
        function startRecording() {
            if (!recognition) {
                initRecognition();
            }
            
            finalTranscript = textBox.value;
            if (finalTranscript && !finalTranscript.endsWith(' ')) {
                finalTranscript += ' ';
            }
            
            try {
                recognition.start();
            } catch (e) {
                console.error('开始录音失败:', e);
                status.textContent = '无法开始录音';
            }
        }
        
        // 停止录音
        function stopRecording() {
            if (recognition) {
                try {
                    recognition.stop();
                } catch (e) {
                    console.error('停止录音失败:', e);
                }
            }
            
            isRecording = false;
            voiceBtn.classList.remove('recording');
            voiceBtn.querySelector('span').textContent = '按住说话';
            status.textContent = '按住按钮开始说话';
            status.classList.remove('recording');
        }
        
        // 鼠标/触摸事件
        const startEvents = ['mousedown', 'touchstart'];
        const endEvents = ['mouseup', 'mouseleave', 'touchend', 'touchcancel'];
        
        startEvents.forEach(event => {
            voiceBtn.addEventListener(event, function(e) {
                e.preventDefault();
                startRecording();
            });
        });
        
        endEvents.forEach(event => {
            voiceBtn.addEventListener(event, function(e) {
                e.preventDefault();
                stopRecording();
            });
        });
        
        // 清空按钮
        clearBtn.addEventListener('click', function() {
            textBox.value = '';
            finalTranscript = '';
            status.textContent = '已清空';
            setTimeout(() => {
                status.textContent = '按住按钮开始说话';
            }, 1500);
        });
        
        // 防止页面滚动（移动端）
        document.body.addEventListener('touchmove', function(e) {
            if (isRecording) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
